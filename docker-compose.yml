version: '3.8'

services:
  # Backend API
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env                        # BUG FIX: inject all .env vars (LLM_MODEL, EMBEDDING_MODEL, etc.)
    environment:
      - QDRANT_HOST=qdrant          # Override hosts to use Docker service names
      - MONGO_HOST=mongo
      - ES_HOST=elasticsearch
      - OLLAMA_HOST=ollama
    depends_on:
      qdrant:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      mongo:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.9.2     # Pinned to a stable version (was :latest)
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:7.0               # Pinned to major version (was :latest)
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=rag_platform
    restart: unless-stopped

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    mem_limit: 1g                   # BUG FIX: prevent OOM kill on low-RAM machines
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  # Ollama LLM Runtime (for Liberal/Strict mode)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  qdrant_data:
  mongo_data:
  es_data:
  ollama_data: